# switchboard managed tmux layer

set -g mouse on
set -g focus-events on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename off
set -g allow-rename off
set -g renumber-windows on
set -g history-limit 50000
set -g detach-on-destroy off
set -g escape-time 0
set -g display-time 1500
set -g status-position bottom

set -g status-style bg='#111111',fg='#ddd6c8'
set -g status-left-length 60
set -g status-right-length 100
set -g status-left '#[fg=#f4a261,bold] #S #[fg=#7f7f7f]|#[default] #(whoami) '
set -g status-right '#[fg=#7f7f7f]#(git -C "#{pane_current_path}" rev-parse --abbrev-ref HEAD 2>/dev/null || printf "-") #[fg=#7f7f7f]| #[fg=#84a98c]%Y-%m-%d %H:%M'
setw -g window-status-current-style bg='#1f1f1f',fg='#f4a261',bold
setw -g window-status-current-format ' #I:#W #{?window_zoomed_flag,[zoom],} '
setw -g window-status-format ' #I:#W '
setw -g pane-border-style fg='#2d2d2d'
setw -g pane-active-border-style fg='#f4a261'
setw -g pane-border-status top
setw -g pane-border-format ' #{pane_index}:#{?pane_title,pane_title,#{pane_current_command}} '

bind -n M-Enter split-window -v -c '#{pane_current_path}'
bind -n M-\\ split-window -h -c '#{pane_current_path}'
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 5
bind -n M-z resize-pane -Z
bind -n M-, previous-window
bind -n M-. next-window
bind -n M-r command-prompt -p 'Pane title' 'select-pane -T "%%"'
bind -n M-t command-prompt -p 'New window name' 'new-window -n "%%" -c "#{pane_current_path}"'
bind -n M-Space select-layout tiled

# Keep window names useful, but let pane titles be the main agent identifier.
set-hook -g after-split-window 'select-layout -E'
set-hook -g session-created 'rename-window main'

if-shell '[ -f "${HOME}/.switchboard/local.conf" ]' 'source-file "${HOME}/.switchboard/local.conf"'

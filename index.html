<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coming Soon</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1117;
        --panel: rgba(255, 255, 255, 0.04);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f3f0e8;
        --muted: #a7b0bb;
        --accent: #f4a261;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(244, 162, 97, 0.22), transparent 34%),
          radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.16), transparent 28%),
          var(--bg);
        color: var(--text);
        font: 500 16px/1.6 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 48px 32px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(16px);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.16em;
        font-size: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 7vw, 72px);
        line-height: 0.95;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        max-width: 36rem;
      }

      a {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">mesh</p>
      <h1>Coming soon.</h1>
      <p>
        Nothing is live at the root yet. For the coding-agent tmux wrapper, go to
        <a href="/mesh">/mesh</a>.
      </p>
    </main>
  </body>
</html>
